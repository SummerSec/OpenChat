<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function(){var t=localStorage.getItem("openchat-theme");if(t)document.documentElement.setAttribute("data-theme",t)})();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-title-key="titles.account">OpenChat - Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="src/theme-switcher.css" />
    <link rel="stylesheet" href="src/pretext.css" />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="frontend-password-modal" class="login-modal" hidden>
      <div class="login-modal-backdrop" id="frontend-password-backdrop"></div>
      <div class="login-modal-box frontend-password-box">
        <p class="panel-label" data-i18n="common.frontendPasswordEyebrow"></p>
        <h2 data-i18n="common.frontendPasswordTitle"></h2>
        <p class="page-copy compact" data-i18n="common.frontendPasswordCopy"></p>
        <label class="field-label" for="frontend-password-input" data-i18n="common.frontendPasswordLabel"></label>
        <input
          class="text-input"
          id="frontend-password-input"
          type="password"
          autocomplete="current-password"
          data-i18n-placeholder="common.frontendPasswordPlaceholder"
        />
        <div id="frontend-password-error" class="login-modal-error" hidden></div>
        <button class="primary-button" id="frontend-password-submit" data-i18n="common.frontendPasswordAction"></button>
      </div>
    </div>

    <div class="layout page-layout">
      <aside class="sidebar page-sidebar" id="page-sidebar">
        <div class="sidebar-rail">
          <div class="sidebar-brand">OC</div>
          <div class="lang-switch">
            <button class="lang-button" data-lang="zh-CN">ZH</button>
            <button class="lang-button" data-lang="en">EN</button>
            <button class="lang-toggle" id="lang-toggle" type="button" aria-label="Switch language" data-lang="zh-CN">
              <span class="lang-toggle-knob">ZH</span>
            </button>
          </div>
          <nav class="sidebar-nav">
            <a class="sidebar-nav-item" href="index.html">
              <span class="icon-grid" aria-hidden="true"></span>
              <span class="sidebar-nav-label" data-i18n="common.navWorkspace"></span>
            </a>
            <a class="sidebar-nav-item" href="settings.html">
              <span class="icon-sliders" aria-hidden="true"></span>
              <span class="sidebar-nav-label" data-i18n="common.navSettings"></span>
            </a>
            <a class="sidebar-nav-item" href="friends.html">
              <span class="icon-users" aria-hidden="true"></span>
              <span class="sidebar-nav-label" data-i18n="common.navFriends"></span>
            </a>
            <a class="sidebar-nav-item active" href="auth.html">
              <span class="icon-user" aria-hidden="true"></span>
              <span class="sidebar-nav-label" data-i18n="common.navAccount"></span>
            </a>
            <a class="sidebar-nav-item" href="history.html">
              <span class="icon-clock" aria-hidden="true"></span>
              <span class="sidebar-nav-label" data-i18n="common.navHistory"></span>
            </a>
          </nav>
          <button class="sidebar-collapse-btn" id="sidebar-collapse-btn" type="button" aria-label="Collapse sidebar">
            <span class="sidebar-collapse-icon" aria-hidden="true"></span>
            <span class="sidebar-nav-label" data-i18n="common.collapseSidebar"></span>
          </button>
        </div>
      </aside>

      <main class="page-main">
        <section class="page-header">
          <p class="panel-label" data-i18n="auth.titleLabel"></p>
          <h1 data-i18n="auth.title"></h1>
          <p class="page-copy" data-i18n="auth.copy"></p>
        </section>

        <section class="auth-grid">
          <article class="workspace-panel auth-card">
            <label class="field-label" for="account-email" data-i18n="auth.email"></label>
            <input class="text-input" id="account-email" type="email" placeholder="team@example.com" />
            <label class="field-label" for="account-name" data-i18n="auth.workspaceName"></label>
            <input class="text-input" id="account-name" type="text" placeholder="Product Ops" />
            <button class="primary-button" id="save-account" data-i18n="auth.save"></button>
          </article>

          <article class="workspace-panel">
            <div class="panel-header">
              <div>
                <p class="panel-label" data-i18n="auth.status"></p>
                <h2 data-i18n="auth.current"></h2>
              </div>
            </div>
            <div class="account-summary" id="account-summary"></div>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="src/script.js"></script>

    <!-- Confirm Dialog -->
    <div id="confirm-dialog" class="confirm-modal" hidden>
      <div class="confirm-modal-backdrop"></div>
      <div class="confirm-modal-box">
        <div class="confirm-modal-icon">?</div>
        <h2 id="confirm-dialog-title">Confirm</h2>
        <p id="confirm-dialog-message">Are you sure?</p>
        <div class="confirm-modal-actions">
          <button class="ghost-button" id="confirm-dialog-cancel" type="button">Cancel</button>
          <button class="primary-button" id="confirm-dialog-confirm" type="button">Confirm</button>
        </div>
      </div>
    </div>
  </body>
</html>
