<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-title-key="titles.settings">OpenChat - Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="src/theme-switcher.css" />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="frontend-password-modal" class="login-modal" hidden>
      <div class="login-modal-backdrop" id="frontend-password-backdrop"></div>
      <div class="login-modal-box frontend-password-box">
        <p class="panel-label" data-i18n="common.frontendPasswordEyebrow"></p>
        <h2 data-i18n="common.frontendPasswordTitle"></h2>
        <p class="page-copy compact" data-i18n="common.frontendPasswordCopy"></p>
        <label class="field-label" for="frontend-password-input" data-i18n="common.frontendPasswordLabel"></label>
        <input
          class="text-input"
          id="frontend-password-input"
          type="password"
          autocomplete="current-password"
          data-i18n-placeholder="common.frontendPasswordPlaceholder"
        />
        <div id="frontend-password-error" class="login-modal-error" hidden></div>
        <button class="primary-button" id="frontend-password-submit" data-i18n="common.frontendPasswordAction"></button>
      </div>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-rail">
          <div class="sidebar-brand">OC</div>
          <div class="lang-switch">
            <button class="lang-button" data-lang="zh-CN">ZH</button>
            <button class="lang-button" data-lang="en">EN</button>
            <button class="lang-toggle" id="lang-toggle" type="button" aria-label="Switch language" data-lang="zh-CN">
              <span class="lang-toggle-knob">ZH</span>
            </button>
          </div>
          <a class="nav-icon" href="index.html" aria-label="Workspace">
            <span class="icon-grid" aria-hidden="true"></span>
          </a>
          <a class="nav-icon active" href="settings.html" aria-label="Settings">
            <span class="icon-sliders" aria-hidden="true"></span>
          </a>
          <a class="nav-icon" href="friends.html" aria-label="Friends">
            <span class="icon-users" aria-hidden="true"></span>
          </a>
          <a class="nav-icon" href="auth.html" aria-label="Account">
            <span class="icon-user" aria-hidden="true"></span>
          </a>
          <a class="nav-icon" href="history.html" aria-label="History">
            <span class="icon-clock" aria-hidden="true"></span>
          </a>
        </div>
      </aside>

      <main class="page-main">
        <section class="page-header">
          <p class="panel-label" data-i18n="settings.titleLabel"></p>
          <h1 data-i18n="settings.title"></h1>
          <p class="page-copy" data-i18n="settings.copy"></p>
        </section>

        <section class="settings-grid-top">
          <article class="workspace-panel">
            <div class="panel-header">
              <div>
                <p class="panel-label" data-i18n="settings.runtimeLabel"></p>
                <h2 data-i18n="settings.runtimeTitle"></h2>
              </div>
            </div>
            <div class="mode-stack" id="runtime-mode-toggle">
              <button class="mode-card active" data-runtime="frontend" data-i18n="settings.frontendMode"></button>
              <button class="mode-card" data-runtime="backend" data-i18n="settings.backendMode"></button>
            </div>
            <p class="settings-note" id="runtime-description"></p>
          </article>

          <article class="workspace-panel">
            <div class="panel-header">
              <div>
                <p class="panel-label" data-i18n="settings.appearanceLabel"></p>
                <h2 data-i18n="settings.appearanceTitle"></h2>
              </div>
            </div>

            <label class="field-label" data-i18n="settings.themeLabel"></label>
            <div class="theme-setting-grid">
              <button class="theme-setting-option active" data-theme="light">
                <span class="theme-setting-icon earth"></span>
                <span data-i18n="settings.themeEarth"></span>
              </button>
              <button class="theme-setting-option" data-theme="sky">
                <span class="theme-setting-icon sky"></span>
                <span data-i18n="settings.themeSky"></span>
              </button>
              <button class="theme-setting-option" data-theme="lavender">
                <span class="theme-setting-icon lavender"></span>
                <span data-i18n="settings.themeLavender"></span>
              </button>
              <button class="theme-setting-option" data-theme="cream">
                <span class="theme-setting-icon cream"></span>
                <span data-i18n="settings.themeCream"></span>
              </button>
              <button class="theme-setting-option" data-theme="mint">
                <span class="theme-setting-icon mint-light"></span>
                <span data-i18n="settings.themeMint"></span>
              </button>
              <button class="theme-setting-option" data-theme="peach">
                <span class="theme-setting-icon peach"></span>
                <span data-i18n="settings.themePeach"></span>
              </button>
              <button class="theme-setting-option" data-theme="dark">
                <span class="theme-setting-icon dark"></span>
                <span data-i18n="settings.themeDark"></span>
              </button>
              <button class="theme-setting-option" data-theme="forest">
                <span class="theme-setting-icon forest"></span>
                <span data-i18n="settings.themeForest"></span>
              </button>
            </div>

            <label class="field-label" data-i18n="settings.fontSizeLabel"></label>
            <div class="font-size-control">
              <div class="font-size-slider-wrapper">
                <input
                  type="range"
                  id="font-size-slider"
                  class="font-size-slider"
                  min="10"
                  max="24"
                  step="1"
                  value="14"
                />
                <div class="font-size-ticks">
                  <span>10</span>
                  <span>12</span>
                  <span>14</span>
                  <span>16</span>
                  <span>18</span>
                  <span>20</span>
                  <span>22</span>
                  <span>24</span>
                </div>
              </div>
              <div class="font-size-input-wrapper">
                <input
                  type="number"
                  id="font-size-input"
                  class="font-size-input"
                  min="10"
                  max="24"
                  value="14"
                />
                <span class="font-size-unit">px</span>
              </div>
            </div>
          </article>
        </section>

        <section class="workspace-panel">
          <div class="panel-header">
            <div>
              <p class="panel-label" data-i18n="settings.modelLabel"></p>
              <h2 data-i18n="settings.modelTitle"></h2>
            </div>
            <div class="settings-model-actions">
              <button class="ghost-button" id="test-enabled-models" data-i18n="common.testAllModels"></button>
              <button class="ghost-button" id="add-custom-model" data-i18n="settings.addModel"></button>
            </div>
          </div>
          <div class="config-grid" id="config-grid"></div>
        </section>
      </main>
    </div>

    <script type="module" src="src/script.js"></script>
  </body>
</html>
