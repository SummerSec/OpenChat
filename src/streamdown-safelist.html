  Tailwind v4 safelist for Streamdown library.
  Streamdown generates HTML with Tailwind classes at runtime.
  This file declares those classes so Tailwind includes them in the build.
-->

  bg-background bg-background/50 bg-background/80 bg-background/90 bg-background/95 bg-black/10 bg-muted bg-muted/80 bg-primary bg-red-100 bg-red-50 bg-sidebar bg-sidebar/80
  border-b-2 border-border border-collapse border-current border-l-4 border-muted-foreground/30 border-sidebar bottom-2 bottom-4 break-all cursor-pointer
  disabled:cursor-not-allowed disabled:opacity-50 divide-border divide-y
  fixed flex flex-1 flex-col font-medium font-mono font-semibold
  gap-1 gap-2 gap-4 group group-hover:block group-hover:opacity-100
  h-4 h-[46px] h-8 h-full hidden
  hover:bg-background hover:bg-muted hover:bg-muted/40 hover:bg-primary/90 hover:text-foreground
  inline-block items-center justify-center justify-end
  left-2 left-4 max-h-32 max-w-full max-w-md
  mb-2 min-h-[200px] min-h-28 min-w-[120px] ml-1 mt-1 mt-2 mt-6 mx-4 my-4 my-6

  pointer-events-auto pointer-events-none
  px-1.5 px-3 px-4 py-0.5 py-1 py-2

  text-2xl text-3xl text-base text-left text-lg text-muted-foreground text-primary text-primary-foreground text-red-600 text-red-700 text-red-800 text-sm text-xl text-xs
  top-2 top-4 top-full transition-all transition-colors transition-transform
  w-4 w-8 w-full whitespace-normal whitespace-nowrap
  z-10 z-20 z-50

  supports-[backdrop-filter]:bg-sidebar/70 supports-[backdrop-filter]:backdrop-blur
"></div>
